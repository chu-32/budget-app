<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세원 & 영미 가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --bg2: #18181c;
  --bg3: #222228;
  --border: #2e2e38;
  --text: #f0f0f4;
  --text2: #9090a0;
  --text3: #5a5a70;
  --accent: #7c6af7;
  --green: #3ecf8e;
  --red: #f46f6f;
  --yellow: #f5c842;
  --orange: #f5934a;
  --blue: #4a9af5;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* Header */
.header {
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 100;
}
.header-title { font-size: 16px; font-weight: 500; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

/* Month tabs */
.month-tabs { display: flex; gap: 4px; }
.month-tab {
  padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 13px; font-family: var(--sans);
  cursor: pointer; transition: all 0.15s;
}
.month-tab:hover { border-color: var(--accent); color: var(--text); }
.month-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

/* Main layout */
.main { padding: 32px; max-width: 1100px; margin: 0 auto; }

/* Summary cards */
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
}
.card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.card-value { font-size: 28px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
.card-value.income { color: var(--green); }
.card-value.expense { color: var(--text); }
.card-value.positive { color: var(--green); }
.card-value.negative { color: var(--red); }
.card-sub { font-size: 12px; color: var(--text3); margin-top: 8px; font-family: var(--mono); }

/* Section */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

/* Category table */
.cat-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
.cat-table th {
  font-size: 11px; color: var(--text3); text-align: right; padding: 8px 12px;
  border-bottom: 1px solid var(--border); font-weight: 400; letter-spacing: 0.5px;
}
.cat-table th:first-child { text-align: left; }
.cat-table th:nth-child(2) { text-align: left; width: 200px; }

.cat-row { cursor: pointer; transition: background 0.1s; }
.cat-row:hover td { background: var(--bg3); }
.cat-row td {
  padding: 14px 12px; border-bottom: 1px solid var(--border);
  font-size: 14px; text-align: right; transition: background 0.1s;
}
.cat-row td:first-child { text-align: left; font-weight: 500; }
.cat-row td:nth-child(2) { text-align: left; }

.cat-name { display: flex; align-items: center; gap: 8px; }
.cat-arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.cat-arrow.open { transform: rotate(90deg); }

/* Progress bar */
.bar-wrap { width: 180px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.bar-ok { background: var(--green); }
.bar-warn { background: var(--yellow); }
.bar-over { background: var(--red); }

.pct { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-left: 8px; }

.num { font-family: var(--mono); font-size: 13px; }
.num.red { color: var(--red); }
.num.green { color: var(--green); }
.num.dim { color: var(--text3); }

/* Sub rows */
.sub-row td {
  padding: 10px 12px 10px 36px; background: var(--bg2);
  font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border);
}
.sub-row td:first-child { text-align: left; }
.sub-row td:nth-child(2) { text-align: left; }

/* Badge */
.badge {
  display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px;
  font-family: var(--mono); font-weight: 500;
}
.badge-ok { background: rgba(62,207,142,0.15); color: var(--green); }
.badge-warn { background: rgba(245,200,66,0.15); color: var(--yellow); }
.badge-over { background: rgba(244,111,111,0.15); color: var(--red); }
.badge-na { background: var(--bg3); color: var(--text3); }

/* Input section */
.input-section {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px; margin-bottom: 40px;
}
.input-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.input-area {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--mono); font-size: 13px; padding: 14px;
  resize: none; outline: none; transition: border-color 0.2s;
  min-height: 80px;
}
.input-area:focus { border-color: var(--accent); }
.input-row { display: flex; gap: 10px; margin-top: 10px; }
.btn {
  padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 13px; font-family: var(--sans); font-weight: 500; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #6b59e8; }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { color: var(--text); border-color: var(--text3); }

/* Recent transactions */
.tx-list { display: flex; flex-direction: column; gap: 8px; }
.tx-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px;
}
.tx-date { font-size: 11px; color: var(--text3); font-family: var(--mono); width: 50px; flex-shrink: 0; }
.tx-cat { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--bg3); color: var(--text2); flex-shrink: 0; }
.tx-name { font-size: 13px; flex: 1; }
.tx-memo { font-size: 11px; color: var(--text3); }
.tx-amount { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--red); flex-shrink: 0; }
.tx-amount.income-tx { color: var(--green); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab {
  padding: 10px 20px; font-size: 13px; color: var(--text3); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.panel { display: none; }
.panel.active { display: block; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px; flex-direction: column; gap: 12px; align-items: flex-start; }
  .main { padding: 16px; }
  .summary { grid-template-columns: 1fr; }
  .card-value { font-size: 22px; }
  .bar-wrap { width: 100px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💰 세원 & 영미 가계부</div>
    <div class="header-sub" id="today-date"></div>
  </div>
  <div class="month-tabs">
    <button class="month-tab active" onclick="setMonth(5)">5월</button>
    <button class="month-tab" onclick="setMonth(6)">6월</button>
    <button class="month-tab" onclick="setMonth(7)">7월</button>
  </div>
</div>

<div class="main">

  <!-- Summary -->
  <div class="summary">
    <div class="card">
      <div class="card-label">총 수입</div>
      <div class="card-value income" id="total-income">—</div>
      <div class="card-sub" id="income-sub"></div>
    </div>
    <div class="card">
      <div class="card-label">총 지출</div>
      <div class="card-value expense" id="total-expense">—</div>
      <div class="card-sub" id="expense-sub"></div>
    </div>
    <div class="card">
      <div class="card-label">잔액</div>
      <div class="card-value" id="total-balance">—</div>
      <div class="card-sub" id="balance-sub"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showPanel('budget')">예산 현황</div>
    <div class="tab" onclick="showPanel('transactions')">지출 내역</div>
    <div class="tab" onclick="showPanel('add')">내역 추가</div>
  </div>

  <!-- Budget panel -->
  <div class="panel active" id="panel-budget">
    <div class="section-header">
      <div class="section-title">대분류별 예산 vs 실지출</div>
    </div>
    <table class="cat-table">
      <thead>
        <tr>
          <th>항목</th>
          <th>사용률</th>
          <th>예산</th>
          <th>지출</th>
          <th>잔액</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="budget-tbody"></tbody>
    </table>
  </div>

  <!-- Transactions panel -->
  <div class="panel" id="panel-transactions">
    <div class="section-header">
      <div class="section-title">지출 내역</div>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <!-- Add panel -->
  <div class="panel" id="panel-add">
    <div class="input-section">
      <div class="input-title">📱 카드 문자 붙여넣기</div>
      <textarea class="input-area" id="sms-input" placeholder="카드 결제 문자를 여기에 붙여넣으세요&#10;예) [Web발신] 세원카드 37,500원 승인 스타벅스 06/01 14:32"></textarea>
      <div class="input-row">
        <button class="btn btn-primary" onclick="parseSMS()">분류하기</button>
        <button class="btn btn-secondary" onclick="clearInput()">초기화</button>
      </div>
      <div id="parse-result" style="margin-top:16px;"></div>
    </div>

    <div class="input-section">
      <div class="input-title">✏️ 직접 입력</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">날짜</div>
          <input type="date" id="input-date" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-family:var(--mono);font-size:13px;outline:none;">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">금액</div>
          <input type="number" id="input-amount" placeholder="0" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-family:var(--mono);font-size:13px;outline:none;">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">대분류</div>
          <select id="input-cat" onchange="updateSubCat()" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;">
            <option value="">선택</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">소분류</div>
          <select id="input-subcat" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;">
            <option value="">선택</option>
          </select>
        </div>
        <div style="grid-column:1/-1;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">메모</div>
          <input type="text" id="input-memo" placeholder="메모 (선택)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">유형</div>
          <select id="input-type" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;">
            <option value="expense">지출</option>
            <option value="income">수입</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">입력자</div>
          <select id="input-person" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;">
            <option value="세원">세원</option>
            <option value="영미">영미</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addEntry()">추가</button>
    </div>
  </div>

</div>

const INCOME = {
  5: [{ date:'05-25', cat:'세원급여', name:'세원 월급', amount:3300000 }],
  6: [],
  7: [],
};

let currentMonth = 5;
let openCats = {};
let localTx = JSON.parse(localStorage.getItem('budget_tx') || '{}');

// ── 유틸 ──────────────────────────────────────────────
const fmt = v => Math.abs(Math.round(v)).toLocaleString('ko-KR') + '원';
const pct = (a, b) => b === 0 ? null : Math.round(a / b * 100);

function allTx(month) {
  const base = TRANSACTIONS[month] || [];
  const local = localTx[month] || [];
  return [...base, ...local].sort((a,b) => a.date.localeCompare(b.date));
}

function calcSpent(month) {
  const spent = {};
  const subSpent = {};
  allTx(month).forEach(tx => {
    if (!spent[tx.cat]) spent[tx.cat] = 0;
    if (!subSpent[tx.cat]) subSpent[tx.cat] = {};
    if (!subSpent[tx.cat][tx.sub]) subSpent[tx.cat][tx.sub] = 0;
    spent[tx.cat] += tx.amount;
    subSpent[tx.cat][tx.sub] = (subSpent[tx.cat][tx.sub] || 0) + tx.amount;
  });
  return { spent, subSpent };
}

// ── 렌더 ──────────────────────────────────────────────
function setMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.month-tab').forEach((b, i) => {
    b.classList.toggle('active', [5,6,7][i] === m);
  });
  openCats = {};
  render();
}

function render() {
  const m = currentMonth;
  const { spent, subSpent } = calcSpent(m);
  const incomeList = INCOME[m] || [];
  const totalIncome = incomeList.reduce((s, t) => s + t.amount, 0);
  const totalExpense = Object.values(spent).reduce((s, v) => s + v, 0);
  const balance = totalIncome - totalExpense;

  document.getElementById('total-income').textContent = totalIncome ? fmt(totalIncome) : '미입력';
  document.getElementById('total-expense').textContent = fmt(totalExpense);
  const balEl = document.getElementById('total-balance');
  balEl.textContent = totalIncome ? (balance >= 0 ? '+' : '-') + fmt(Math.abs(balance)) : '수입 미입력';
  balEl.className = 'card-value ' + (totalIncome === 0 ? '' : balance >= 0 ? 'positive' : 'negative');
  document.getElementById('income-sub').textContent = `${m}월 수입 합계`;
  document.getElementById('expense-sub').textContent = `${m}월 지출 합계`;
  document.getElementById('balance-sub').textContent = totalIncome ? `수입 - 지출` : '';

  // Budget table
  const tbody = document.getElementById('budget-tbody');
  tbody.innerHTML = '';
  Object.entries(BUDGETS).forEach(([cat, { total, subs }]) => {
    const s = spent[cat] || 0;
    const p = pct(s, total);
    const remain = total - s;
    const barClass = p === null ? '' : p >= 100 ? 'bar-over' : p >= 80 ? 'bar-warn' : 'bar-ok';
    const badgeClass = p === null ? 'badge-na' : p >= 100 ? 'badge-over' : p >= 80 ? 'badge-warn' : 'badge-ok';
    const badgeText = p === null ? '미설정' : p >= 100 ? '초과' : p >= 80 ? '주의' : '정상';
    const color = CATEGORIES[cat]?.color || '#7c6af7';

    const tr = document.createElement('tr');
    tr.className = 'cat-row';
    tr.id = `cat-${cat}`;
    tr.innerHTML = `
      <td>
        <div class="cat-name">
          <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
          <span id="arrow-${cat}" class="cat-arrow">▶</span>
          ${cat}
        </div>
      </td>
      <td>
        <div style="display:flex;align-items:center;">
          <div class="bar-wrap"><div class="bar-fill ${barClass}" style="width:${Math.min(p||0,100)}%"></div></div>
          <span class="pct">${p !== null ? p+'%' : '—'}</span>
        </div>
      </td>
      <td><span class="num dim">${total ? fmt(total) : '미설정'}</span></td>
      <td><span class="num">${fmt(s)}</span></td>
      <td><span class="num ${remain < 0 ? 'red' : 'green'}">${total ? (remain>=0?'+':'-')+fmt(Math.abs(remain)) : '—'}</span></td>
      <td><span class="badge ${badgeClass}">${badgeText}</span></td>
    `;
    tr.onclick = () => toggleSub(cat, subs, subSpent[cat] || {});
    tbody.appendChild(tr);

    if (openCats[cat]) {
      renderSubRows(cat, subs, subSpent[cat] || {}, tbody);
    }
  });

  // Transaction list
  const txList = document.getElementById('tx-list');
  txList.innerHTML = '';
  const txs = allTx(m).slice().reverse();
  txs.forEach(tx => {
    const div = document.createElement('div');
    div.className = 'tx-item';
    div.innerHTML = `
      <span class="tx-date">${tx.date}</span>
      <span class="tx-cat">${tx.sub || tx.cat}</span>
      <span class="tx-name">${tx.name}${tx.memo ? `<br><span class="tx-memo">${tx.memo}</span>` : ''}</span>
      <span class="tx-amount">${tx.amount < 0 ? '-' : ''}${fmt(tx.amount)}</span>
    `;
    txList.appendChild(div);
  });
}

function renderSubRows(cat, subs, subSpent, tbody, afterRow) {
  const catRow = document.getElementById(`cat-${cat}`);
  let ref = catRow;
  Object.entries(subs).forEach(([sub, budget]) => {
    const s = subSpent[sub] || 0;
    const p = pct(s, budget);
    const remain = budget - s;
    const barClass = p === null ? '' : p >= 100 ? 'bar-over' : p >= 80 ? 'bar-warn' : 'bar-ok';
    const tr = document.createElement('tr');
    tr.className = 'sub-row';
    tr.id = `sub-${cat}-${sub}`;
    tr.innerHTML = `
      <td>${sub}</td>
      <td>
        <div style="display:flex;align-items:center;">
          <div class="bar-wrap" style="width:120px;"><div class="bar-fill ${barClass}" style="width:${Math.min(p||0,100)}%"></div></div>
          <span class="pct">${p !== null ? p+'%' : '—'}</span>
        </div>
      </td>
      <td><span class="num dim">${budget ? fmt(budget) : '미설정'}</span></td>
      <td><span class="num">${fmt(s)}</span></td>
      <td><span class="num ${remain < 0 ? 'red' : 'green'}">${budget ? (remain>=0?'+':'-')+fmt(Math.abs(remain)) : '—'}</span></td>
      <td></td>
    `;
    ref.after(tr);
    ref = tr;
  });
}

function toggleSub(cat, subs, subSpent) {
  openCats[cat] = !openCats[cat];
  const arrow = document.getElementById(`arrow-${cat}`);
  if (!openCats[cat]) {
    Object.keys(subs).forEach(sub => {
      const el = document.getElementById(`sub-${cat}-${sub}`);
      if (el) el.remove();
    });
    if (arrow) arrow.classList.remove('open');
  } else {
    const tbody = document.getElementById('budget-tbody');
    renderSubRows(cat, subs, subSpent, tbody);
    if (arrow) arrow.classList.add('open');
  }
}

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  event.target.classList.add('active');
}

// ── 입력 ──────────────────────────────────────────────
function populateCatSelect() {
  const sel = document.getElementById('input-cat');
  Object.keys(CATEGORIES).forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat; opt.textContent = cat;
    sel.appendChild(opt);
  });
}

function updateSubCat() {
  const cat = document.getElementById('input-cat').value;
  const sel = document.getElementById('input-subcat');
  sel.innerHTML = '<option value="">선택</option>';
  if (cat && CATEGORIES[cat]) {
    CATEGORIES[cat].subs.forEach(sub => {
      const opt = document.createElement('option');
      opt.value = sub; opt.textContent = sub;
      sel.appendChild(opt);
    });
  }
}

function addEntry() {
  const date = document.getElementById('input-date').value;
  const amount = parseInt(document.getElementById('input-amount').value);
  const cat = document.getElementById('input-cat').value;
  const sub = document.getElementById('input-subcat').value;
  const memo = document.getElementById('input-memo').value;
  const type = document.getElementById('input-type').value;
  const person = document.getElementById('input-person').value;

  if (!date || !amount || !cat) { alert('날짜, 금액, 대분류는 필수예요'); return; }

  const m = parseInt(date.split('-')[1]);
  const d = date.split('-').slice(1).join('-');

  if (type === 'expense') {
    if (!localTx[m]) localTx[m] = [];
    localTx[m].push({ date: d, cat, sub: sub || cat, name: sub || cat, amount, memo, person });
  } else {
    // income - simplified
    if (!INCOME[m]) INCOME[m] = [];
    INCOME[m].push({ date: d, cat, name: sub || cat, amount });
  }

  localStorage.setItem('budget_tx', JSON.stringify(localTx));
  currentMonth = m;
  render();
  alert('추가됐어요!');
}

function parseSMS() {
  const text = document.getElementById('sms-input').value.trim();
  const result = document.getElementById('parse-result');
  if (!text) { result.innerHTML = '<p style="color:var(--text3)">문자를 먼저 입력해주세요</p>'; return; }

  const amountMatch = text.match(/([0-9,]+)원/);
  const amount = amountMatch ? parseInt(amountMatch[1].replace(/,/g,'')) : null;
  const dateMatch = text.match(/(\d{2})\/(\d{2})/);
  const date = dateMatch ? `2026-${dateMatch[1]}-${dateMatch[2]}` : new Date().toISOString().split('T')[0];

  result.innerHTML = `
    <div style="padding:12px;background:var(--bg3);border-radius:8px;font-size:13px;color:var(--text2);">
      ✅ 파싱 완료<br>
      금액: <span style="color:var(--text);font-family:var(--mono)">${amount ? fmt(amount) : '미인식'}</span><br>
      날짜: <span style="color:var(--text);font-family:var(--mono)">${date}</span><br><br>
      <span style="color:var(--text3)">아래 직접입력 칸에서 대분류/소분류를 선택하고 추가해주세요</span>
    </div>
  `;
  document.getElementById('input-date').value = date;
  if (amount) document.getElementById('input-amount').value = amount;
}

function clearInput() {
  document.getElementById('sms-input').value = '';
  document.getElementById('parse-result').innerHTML = '';
}

// ── 초기화 ──────────────────────────────────────────────
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

const dateInput = document.getElementById('input-date');
dateInput.value = new Date().toISOString().split('T')[0];

populateCatSelect();
render();
